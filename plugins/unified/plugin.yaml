author: Hermes Team
config_schema:
  auto_index:
    default: true
    description: فهرسة تلقائية عند التغيير
    type: boolean
  chunk_overlap:
    default: 64
    description: تداخل القطع
    type: integer
  chunk_size:
    default: 384
    description: حجم القطعة (أقل للعربية)
    type: integer
  community_algorithm:
    default: leiden
    description: خوارزمية المجتمعات (leiden أو louvain)
    type: string
  db_path:
    default: ~/.hermes/memory_store.db
    description: مسار قاعدة بيانات الحقائق
    type: string
  device:
    default: auto
    description: الجهاز (auto / cuda / mps / cpu)
    type: string
  embedding_model:
    default: BAAI/bge-m3
    description: نموذج التضمين
    type: string
  enable_synonym_expansion:
    default: false
    description: تفعيل توسيع الاستعلام بقاموس المترادفات (افتراضياً معطّل — BGE-M3
      يعالج المرادفات دلالياً)
    type: boolean
  graphs_dir:
    default: ~/.hermes/graphs
    description: مجلد حفظ الرسوم المعرفية
    type: string
  similarity_threshold:
    default: 0.7
    description: عتبة التشابه للحواف
    type: float
  wikillm_root:
    default: ~/wiki/llm/projects
    description: جذر WikiLLM للفهرسة
    type: string
dependencies:
- networkx
- scikit-learn
- python-louvain
- leidenalg
- igraph
- sentence-transformers
- langchain
- pypdf
description: نظام ذاكرة موحد يدمج FTS5 + Knowledge Graph + WikiLLM
license: MIT
name: unified
version: 3.5.0
